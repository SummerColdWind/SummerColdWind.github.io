<!DOCTYPE html>
<html lang="{lang}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{description}">
  <title>{title}</title>
{alternate_link}
  <link rel="stylesheet" href="{asset_prefix}assets/css/main.css">
</head>
<body>
  <a class="skip-link" href="#main">{skip_link}</a>

{lang_switch_bar}
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="#">{name}</a>
      <button class="nav-toggle" aria-label="{nav_toggle}" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
{nav_block}
    </div>
  </header>

  <main id="main">
{main_sections}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; <span id="year"></span> {name}. {footer_rights}</p>
{footer_note_block}
    </div>
  </footer>

  <script src="{asset_prefix}assets/js/main.js"></script>
  <script src="{asset_prefix}assets/js/games.js"></script>
</body>
</html>
